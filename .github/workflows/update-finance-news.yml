name: Update Static Heatmap Data

on:
  workflow_dispatch:           # 手動觸發
  schedule:
    # UTC 01:00–05:00 每 15 分鐘（台灣時間 09:00–13:00）
    - cron: "*/15 1-5 * * 1-5"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install xlrd

      - name: Build static heatmap artifacts
        env:
          PYTHONUTF8: "1"
        run: |
          python docs/build_semiconductor_ai_chain.py

      - name: Commit updated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/representative_chain_data.json
          # 只有真的有變更才 commit，避免空 commit 錯誤
          git diff --cached --quiet || git commit -m "chore: update static heatmap [skip ci]"
          git push
