name: Update Finance News Page

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron 最短可設到每 5 分鐘，但實際執行可能延遲。
    - cron: "*/15 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: finance_news_dashboard/requirements.txt

      - name: Install dependencies
        working-directory: finance_news_dashboard
        run: python -m pip install -r requirements.txt

      - name: Generate static HTML
        working-directory: finance_news_dashboard
        run: python generate_static.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: finance_news_dashboard/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
