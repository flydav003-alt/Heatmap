name: Update Static Heatmap Data

on:
  workflow_dispatch:
  schedule:
    # 台灣時間每天 18:00（UTC 10:00），週一到週五收盤後更新財報/月營收/EPS
    - cron: "0 10 * * 1-5"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install xlrd

      - name: Build static heatmap
        env:
          PYTHONUTF8: "1"
        run: |
          python docs/build_semiconductor_ai_chain.py

      - name: Commit updated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/representative_chain_data.json
          git diff --cached --quiet || git commit -m "chore: update static heatmap [skip ci]"
          git push
